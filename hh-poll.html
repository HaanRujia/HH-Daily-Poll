<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hikari & Haan — Daily Poll</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;
    background:#0a0906;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:Georgia,'Times New Roman',serif;
    padding:32px 20px;
    position:relative;
    overflow:hidden;
  }
  .glow-bg{
    position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 60% 40% at 50% 50%,rgba(180,140,60,0.07),transparent 70%);
  }
  .noise{
    position:fixed;inset:0;pointer-events:none;
    background-image:repeating-linear-gradient(45deg,rgba(255,255,255,0.008) 0px,rgba(255,255,255,0.008) 1px,transparent 1px,transparent 8px);
  }
  .wrap{
    width:100%;max-width:540px;
    opacity:0;transform:translateY(24px);
    transition:all 0.8s cubic-bezier(0.22,1,0.36,1);
    position:relative;z-index:1;
  }
  .wrap.in{opacity:1;transform:translateY(0)}
  .header{text-align:center;margin-bottom:22px}
  .header-line{display:inline-flex;align-items:center;gap:10px}
  .line-l{width:28px;height:1px;background:linear-gradient(to right,transparent,#b8922e)}
  .line-r{width:28px;height:1px;background:linear-gradient(to left,transparent,#b8922e)}
  .label{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:#b8922e;font-family:monospace}
  .title{margin-top:8px;font-size:28px;color:#f0e6cc;letter-spacing:3px;font-style:italic;text-shadow:0 0 40px rgba(184,146,46,0.3)}
  .card{
    background:linear-gradient(160deg,#111009,#0d0c08);
    border:1px solid rgba(184,146,46,0.25);
    box-shadow:0 20px 60px rgba(0,0,0,0.6),inset 0 1px 0 rgba(184,146,46,0.1);
    overflow:hidden;
  }
  .gold-bar-top{height:2px;background:linear-gradient(to right,transparent,#b8922e 30%,#e8c76a 50%,#b8922e 70%,transparent)}
  .gold-bar-bot{height:1px;background:linear-gradient(to right,transparent,rgba(184,146,46,0.25),transparent)}
  .banner{
    padding:12px;
    background:rgba(184,146,46,0.08);
    border-bottom:1px solid rgba(184,146,46,0.2);
    text-align:center;font-size:9px;letter-spacing:3px;
    text-transform:uppercase;color:#b8922e;font-family:monospace;
    display:none;
  }
  .banner.show{display:block}
  @keyframes glow{from{opacity:1}to{opacity:0.6}}
  .banner.pulse{animation:glow 1s ease infinite alternate}
  .q-area{padding:32px 28px 24px;text-align:center}
  .question{font-size:17px;line-height:1.65;color:#ede3cf;font-style:italic}
  .divider{margin:0 28px 20px;height:1px;background:linear-gradient(to right,transparent,rgba(184,146,46,0.4),transparent)}
  .options{padding:0 20px 24px}
  .opt-btn{
    width:100%;background:rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.06);
    cursor:pointer;padding:0;text-align:left;
    position:relative;overflow:hidden;
    transition:all 0.25s;display:block;margin-bottom:9px;
  }
  .opt-btn:hover{background:rgba(184,146,46,0.06);border-color:rgba(184,146,46,0.25)}
  .opt-btn.my-vote{background:rgba(184,146,46,0.12);border-color:rgba(184,146,46,0.5)}
  .opt-btn:disabled{cursor:default}
  .fill-bar{
    position:absolute;top:0;left:0;bottom:0;width:0;
    transition:width 1.2s cubic-bezier(0.22,1,0.36,1);
  }
  .fill-bar.mine{background:linear-gradient(to right,rgba(184,146,46,0.18),rgba(184,146,46,0.06))}
  .fill-bar.other{background:linear-gradient(to right,rgba(255,255,255,0.04),transparent)}
  .opt-inner{position:relative;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .opt-left{display:flex;align-items:flex-start;gap:10px;flex:1}
  .dot{width:5px;height:5px;border-radius:50%;background:rgba(184,146,46,0.3);flex-shrink:0;margin-top:6px;transition:all 0.2s}
  .dot.active{background:#b8922e;box-shadow:0 0 6px rgba(184,146,46,0.6)}
  .opt-text{color:rgba(210,195,168,0.85);font-size:13px;line-height:1.5;font-family:Georgia,serif}
  .opt-text.active{color:#f0e6cc}
  .opt-text.long{font-style:italic}
  .opt-right{display:flex;align-items:center;gap:6px;flex-shrink:0;display:none}
  .opt-right.show{display:flex}
  .star{color:#b8922e;font-size:9px}
  .pct{font-family:monospace;font-size:11px;color:rgba(184,146,46,0.5);min-width:32px;text-align:right}
  .pct.win{color:#e8c76a;font-weight:bold}
  .cnt{font-family:monospace;font-size:9px;color:rgba(184,146,46,0.3)}
  .total{margin-top:14px;text-align:center;color:rgba(184,146,46,0.4);font-family:monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;display:none}
  .total.show{display:block}
  .loading{text-align:center;color:rgba(184,146,46,0.4);font-family:monospace;font-size:10px;letter-spacing:3px;padding:20px}
  .footer{margin-top:14px;display:flex;justify-content:space-between;padding:0 2px}
  .footer span{color:rgba(184,146,46,0.35);font-family:monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>
<div class="glow-bg"></div>
<div class="noise"></div>
<div class="wrap" id="wrap">
  <div class="header">
    <div class="header-line">
      <div class="line-l"></div>
      <span class="label">daily poll</span>
      <div class="line-r"></div>
    </div>
    <div class="title">Hikari &amp; Haan</div>
  </div>

  <div class="card">
    <div class="gold-bar-top"></div>
    <div class="banner pulse" id="resetBanner">✦ &nbsp;second pull detected — resetting votes&nbsp; ✦</div>
    <div class="banner" id="clearedBanner">✓ &nbsp;votes cleared — vote again</div>
    <div class="q-area"><div class="question" id="question">loading...</div></div>
    <div class="divider"></div>
    <div class="options" id="options"><div class="loading">loading...</div></div>
    <div class="gold-bar-bot"></div>
  </div>

  <div class="footer">
    <span>shared · live</span>
    <span id="timer">resets -- (GMT+7)</span>
  </div>
</div>

<script>
const SUPA_URL = "https://illuhxmzyovbekduxmau.supabase.co";
const SUPA_KEY = "sb_publishable_4v7wnlP_ih4Bc-wZcg0vKg_fBZJl2DN";

const ALL_POLLS = [
  ["Who fell first?",["Hikari","Haan"]],
  ["If they argue, who apologizes first?",["Hikari","Haan","They never apologize"]],
  ["If Haan gets sick, Hikari will:",["Scold first, care later","Ban her from leaving bed","Feed her green mango"]],
  ["If Hikari gets sick, Haan will:",["Panic","Try to cook (and fail)","Tease him anyway"]],
  ["Who blushes faster?",["Hikari","Haan"]],
  ["Who pretends to be cooler than they actually are?",["Hikari","Haan"]],
  ["Who remembers small details better?",["Hikari","Haan"]],
  ["Who secretly takes more candid photos?",["Hikari","Haan"]],
  ["Who is softer than they admit?",["Hikari","Haan"]],
  ["Who says 'don't come closer' but wants the opposite?",["Hikari","Haan"]],
  ["Who is your favorite?",["Hikari","Haan"]],
  ["Who teases about sensitive topics more?",["Haan","Hikari"]],
  ["Who is more clingy but hides it?",["Hikari","Haan"]],
  ["Who would cry more at their wedding?",["Hikari","Haan","Me","The guests"]],
  ["Who would propose first?",["Hikari","Haan","Both accidentally","It just happens"]],
  ["Who is more scared of losing the other?",["Hikari","Haan"]],
  ["Who initiates late-night deep talks?",["Hikari","Haan"]],
  ["During a serious fight, who breaks first?",["Hikari stands outside Haan's door all night just in case.","Haan cries alone, then shows up pretending nothing happened."]],
  ["If Haan distances herself, Hikari would…",["Pretend not to notice, but watch her more carefully than ever.","Confront her directly in a low, controlled voice.","Give her space but quietly remove anyone who gets close to her.","Act normal — then lose control the moment she tries to walk away."]],
  ["If Hikari looks cold in public, it's because…",["He's protecting Haan from unnecessary attention.","He's jealous but refusing to show it.","He's overwhelmed and doesn't know how to process it.","He knows she'll understand without explanation."]],
  ["When Haan gets jealous, she usually…",["Teases him in a tone that's slightly too sharp.","Clings to him more in subtle ways.","Pretends she doesn't care, then overthinks it.","Confronts him but regrets sounding insecure."]],
  ["After marriage, the biggest change is that…",["Hikari stops pretending to be restrained.","Haan realizes he was holding back for years.","They both become more openly affectionate in private.","The tension that used to be hidden becomes undeniable."]],
  ["If one of them has a nightmare, what happens?",["Hikari wakes up before Haan fully realizes she's scared.","Haan reaches for him unconsciously in her sleep.","Neither says anything, but they hold each other tighter.","One whispers reassurance in the dark without turning on the light."]],
  ["If someone insults Haan in front of Hikari…",["He responds calmly, but the room temperature drops instantly.","He handles it later in a way no one sees.","He places a hand on Haan's waist in silent warning.","He smiles politely while making it clear she belongs to him."]],
  ["Who falls harder over time?",["Hikari — the longer he has her, the deeper he sinks.","Haan — she slowly realizes how much he means.","Both, just in different ways.","They keep thinking they've reached the limit — but it keeps growing."]],
  ["When Hikari gets overwhelmed…",["He isolates himself until Haan forces her way in.","He gets sharper in tone but softer in actions.","He denies it, but his grip on her tightens.","He rests his forehead against hers without explanation."]],
  ["If Haan says 'don't leave me'…",["Hikari freezes — he didn't know she was that afraid.","He immediately pulls her into his chest without words.","He responds quietly: 'I never planned to.'","He realizes she needs reassurance more than she shows."]],
  ["If Hikari ever cries…",["Only Haan would see it.","He would try to hide it but fail.","It would be because he was afraid of losing her.","He wouldn't cry loudly — just silently hold her tighter."]],
  ["If they had to choose each other in every universe…",["Hikari would choose her even if she didn't remember him.","Haan would choose him even if he was colder.","They would always find each other eventually.","They would fall in love again, differently each time."]],
  ["If Haan teases in public, Hikari will…",["Keep a straight face but tighten his grip around her waist.","Lean down and murmur something worse into her ear.","Act unaffected — then settle the score later in private.","Warn her softly that she's playing a dangerous game."]],
  ["Who loses composure faster emotionally?",["Hikari — control slipping is rare for him.","Haan — she didn't expect him to respond like that.","Both pretend to be calm but their breathing betrays them."]],
  ["After marriage, who becomes more physically clingy?",["Hikari, especially at night when no one can see.","Haan, because she finally feels safe enough."]],
  ["If Haan tries to walk away mid-conversation, Hikari would…",["Grab her wrist gently but firmly.","Pull her back by the waist without asking."]],
  ["Who enjoys seeing the other flustered more?",["Hikari — because it's rare and addictive.","Haan — because she loves breaking his calm."]],
  ["Who is more sensitive to small touches?",["Hikari, especially when he's already on edge.","Haan, even if she pretends she's unaffected."]],
  ["During a quiet night, who makes the first subtle move?",["Hikari shifts closer and pretends it's unconscious.","Haan traces a finger along his arm just to test him."]],
  ["When Haan bites her lip absentmindedly, Hikari…",["Looks away immediately.","Stares and doesn't hide it.","Tells her to stop in a low voice.","Steps closer without saying anything."]],
  ["Who breaks the kiss first?",["Hikari — still trying to be controlled.","Haan — she needs air first."]],
  ["Who likes being backed against the wall more than they admit?",["Hikari","Haan"]],
  ["Who loses patience first when teasing goes too far?",["Hikari — once his jaw tightens, it's over.","Haan — when he stops smiling and steps closer, she forgets how brave she was."]],
  ["Who reacts more strongly to slow kisses along the neck?",["Hikari — his control visibly cracks.","Haan — her fingers clutch his shirt tighter every time."]],
  ["Who pretends not to notice wandering hands… but definitely notices?",["Hikari — calm face, but his breathing changes instantly.","Haan — keeps talking, but her voice gets softer."]],
  ["Who grips tighter during a kiss when jealousy is involved?",["Hikari — possessive without saying a word.","Haan — stubbornly proving a point."]],
  ["Who would not survive prolonged, deliberate teasing?",["Hikari — especially after years of restraint.","Haan — especially when he stops responding and just looks at her."]]
];

function getGMT7(){
  const n=new Date(), g=new Date(n.getTime()+7*3600000);
  return{
    key:`${g.getUTCFullYear()}-${String(g.getUTCMonth()+1).padStart(2,'0')}-${String(g.getUTCDate()).padStart(2,'0')}`,
    seed:g.getUTCFullYear()*10000+(g.getUTCMonth()+1)*100+g.getUTCDate()
  };
}

function shuffle(arr,seed){
  const a=[...arr]; let s=seed;
  for(let i=a.length-1;i>0;i--){
    s=(s*1664525+1013904223)&0xffffffff;
    const j=Math.abs(s)%(i+1);
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function timeLeft(){
  const n=new Date(), g=new Date(n.getTime()+7*3600000);
  const nm=new Date(Date.UTC(g.getUTCFullYear(),g.getUTCMonth(),g.getUTCDate()+1));
  const d=nm-g;
  const h=Math.floor(d/3600000), m=Math.floor((d%3600000)/60000), s=Math.floor((d%60000)/1000);
  return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

async function supaGet(id){
  const r=await fetch(`${SUPA_URL}/rest/v1/poll_votes?id=eq.${encodeURIComponent(id)}&select=votes`,{
    headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}
  });
  const d=await r.json();
  return d&&d.length>0?d[0].votes:null;
}

async function supaUpsert(id,votes){
  await fetch(`${SUPA_URL}/rest/v1/poll_votes`,{
    method:'POST',
    headers:{
      'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,
      'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'
    },
    body:JSON.stringify({id,votes,updated_at:new Date().toISOString()})
  });
}

// Pull count stored in localStorage (per-device, intentional — tracks if THIS device pulled twice)
function getPullCount(key){return parseInt(localStorage.getItem('hh_pull_'+key)||'0')}
function incPullCount(key){localStorage.setItem('hh_pull_'+key,getPullCount(key)+1)}

let currentVotes=null, userVote=null, pollOpts=[];

async function init(){
  const{key,seed}=getGMT7();
  const shuffled=shuffle(ALL_POLLS,seed);
  const[question,options]=shuffled[0];
  pollOpts=options;

  document.getElementById('question').textContent=question;

  const pollId=`hh-${key}`;
  const pullId=`hh-pull-${key}`;

  const pullCount=getPullCount(pullId);
  incPullCount(pullId);

  if(pullCount>=1){
    // Second pull — reset
    document.getElementById('resetBanner').classList.add('show');
    const fresh=options.map(()=>0);
    await supaUpsert(pollId,fresh);
    currentVotes=fresh;
    setTimeout(()=>{
      document.getElementById('resetBanner').classList.remove('show');
      document.getElementById('clearedBanner').classList.add('show');
      renderOptions(options,fresh,null,'voting');
      document.getElementById('wrap').classList.add('in');
    },2500);
  } else {
    // First pull — load existing
    let votes=await supaGet(pollId);
    if(!votes||votes.length!==options.length) votes=options.map(()=>0);
    currentVotes=votes;
    renderOptions(options,votes,null,'voting');
    document.getElementById('wrap').classList.add('in');
  }

  // Timer
  setInterval(()=>{
    document.getElementById('timer').textContent=`resets ${timeLeft()} (GMT+7)`;
  },1000);
  document.getElementById('timer').textContent=`resets ${timeLeft()} (GMT+7)`;
}

function renderOptions(options,votes,myVote,status){
  const total=votes.reduce((a,b)=>a+b,0);
  const maxV=Math.max(...votes);
  const container=document.getElementById('options');
  container.innerHTML='';

  options.forEach((opt,i)=>{
    const pct=total>0?Math.round(votes[i]/total*100):0;
    const isWin=status==='voted'&&votes[i]===maxV&&votes[i]>0;
    const isMine=myVote===i;
    const canVote=status==='voting';

    const btn=document.createElement('button');
    btn.className='opt-btn'+(isMine?' my-vote':'');
    btn.disabled=!canVote;

    // Fill bar
    const fill=document.createElement('div');
    fill.className='fill-bar'+(isMine?' mine':' other');
    btn.appendChild(fill);

    // Inner
    const inner=document.createElement('div');
    inner.className='opt-inner';

    const left=document.createElement('div');
    left.className='opt-left';

    const dot=document.createElement('div');
    dot.className='dot'+(isMine?' active':'');

    const txt=document.createElement('span');
    txt.className='opt-text'+(isMine?' active':'')+(opt.length>40?' long':'');
    txt.textContent=opt;

    left.appendChild(dot);left.appendChild(txt);
    inner.appendChild(left);

    // Right (results)
    const right=document.createElement('div');
    right.className='opt-right'+(status==='voted'?' show':'');
    if(isWin){const s=document.createElement('span');s.className='star';s.textContent='✦';right.appendChild(s)}
    const p=document.createElement('span');p.className='pct'+(isWin?' win':'');p.textContent=pct+'%';
    const c=document.createElement('span');c.className='cnt';c.textContent=`(${votes[i]})`;
    right.appendChild(p);right.appendChild(c);
    inner.appendChild(right);

    btn.appendChild(inner);

    if(canVote){
      btn.addEventListener('click',async()=>{
        if(userVote!==null)return;
        userVote=i;
        currentVotes[i]++;
        const pollId=`hh-${getGMT7().key}`;
        renderOptions(options,currentVotes,i,'voted');
        const total2=document.getElementById('total');
        if(total2){total2.style.display='block'}
        await supaUpsert(pollId,currentVotes);
      });
    }

    container.appendChild(btn);
  });

  // Total
  if(status==='voted'){
    const t=document.createElement('div');
    t.id='total';t.className='total show';
    t.textContent=`${total} vote${total!==1?'s':''} cast`;
    container.appendChild(t);
  }

  // Animate fill bars after render
  if(status==='voted'){
    setTimeout(()=>{
      const fills=container.querySelectorAll('.fill-bar');
      fills.forEach((f,i)=>{
        const pct2=total>0?Math.round(votes[i]/total*100):0;
        f.style.width=pct2+'%';
      });
    },50);
  }
}

init();
</script>
</body>
</html>
